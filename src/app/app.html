<mat-toolbar class="app-toolbar">
  <a mat-button routerLink="/home" class="app-brand">Plantas Solares</a>

  <span class="app-toolbar__spacer"></span>

  <nav class="app-nav">
    <a
      mat-button
      routerLink="/home"
      routerLinkActive="app-nav__link--active"
      [routerLinkActiveOptions]="{ exact: true }"
    >
      Inicio
    </a>
    <a mat-button routerLink="/plants" routerLinkActive="app-nav__link--active">Plantas</a>
    <a mat-button routerLink="/map" routerLinkActive="app-nav__link--active">Mapa</a>
    @if (isLogged() && isAdmin()) {
      <a mat-button routerLink="/admin" routerLinkActive="app-nav__link--active">Admin</a>
    }
  </nav>

  <div class="app-toolbar__actions">
    @if (!isLogged()) {
      <a mat-button routerLink="/login">Login</a>
      <a mat-stroked-button routerLink="/register">Crear cuenta</a>
    }

    <button mat-icon-button class="app-icon-action" type="button" (click)="toggleTheme()" aria-label="Cambiar tema">
      <mat-icon>{{ theme() === 'light' ? 'dark_mode' : 'light_mode' }}</mat-icon>
    </button>

    @if (isLogged()) {
      <button
        mat-icon-button
        class="app-icon-action app-user-trigger"
        [matMenuTriggerFor]="userMenu"
        aria-label="Menu usuario"
      >
        @if (user()?.avatarUrl) {
          <img [src]="user()?.avatarUrl!" alt="Avatar" class="app-avatar" />
        } @else {
          <span class="app-avatar app-avatar--fallback">{{ avatarLetter() }}</span>
        }
      </button>

      <mat-menu #userMenu="matMenu">
        <div class="app-user-menu__header">
          <div class="app-user-menu__label">Sesion iniciada como</div>
          <div class="app-user-menu__email">{{ user()?.email }}</div>
          <div class="app-user-menu__role">
            <span>Rol:</span>
            <strong>{{ user()?.role }}</strong>
          </div>
        </div>

        <mat-divider></mat-divider>

        <button mat-menu-item routerLink="/profile">
          <mat-icon>person</mat-icon>
          <span>Perfil</span>
        </button>

        @if (isAdmin()) {
          <button mat-menu-item routerLink="/admin">
            <mat-icon>admin_panel_settings</mat-icon>
            <span>Admin</span>
          </button>
        }

        <mat-divider></mat-divider>

        <button mat-menu-item (click)="logout()">
          <mat-icon>logout</mat-icon>
          <span>Cerrar sesion</span>
        </button>
      </mat-menu>
    }
  </div>
</mat-toolbar>

<main class="app-route-stage" [class.app-route-stage--auth]="isAuthRoute()" [class.app-route-stage--main]="!isAuthRoute()">
  <router-outlet></router-outlet>
</main>
