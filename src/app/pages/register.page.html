<div class="auth-sunflower-page">
  <span class="sunflower-bloom sunflower-bloom--peek-left" aria-hidden="true"></span>
  <span class="sunflower-bloom sunflower-bloom--peek-right" aria-hidden="true"></span>

  <div class="sunflower-garden" aria-hidden="true">
    <span class="sunflower-stalk sunflower-stalk--1"></span>
    <span class="sunflower-stalk sunflower-stalk--2"></span>
    <span class="sunflower-stalk sunflower-stalk--3"></span>
    <span class="sunflower-stalk sunflower-stalk--4"></span>
    <span class="sunflower-stalk sunflower-stalk--5"></span>
    <span class="sunflower-stalk sunflower-stalk--6"></span>
  </div>

  <div class="auth-sunflower-card-wrap register-card-wrap">
    <mat-card class="auth-sunflower-card register-card">
      <mat-card-header>
        <mat-card-title>Crear cuenta</mat-card-title>
        <mat-card-subtitle>Registra tu usuario para empezar a gestionar plantas.</mat-card-subtitle>
      </mat-card-header>

      <mat-card-content>
        <form [formGroup]="form" (ngSubmit)="submit()" class="register-form" novalidate>
          <mat-form-field appearance="outline">
            <mat-label>Nombre</mat-label>
            <input matInput formControlName="name" autocomplete="name" />
            <mat-hint>
              <span [class.text-danger]="nameMsg().type === 'bad'" [class.text-success]="nameMsg().type === 'ok'">
                {{ nameMsg().text }}
              </span>
            </mat-hint>
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Email</mat-label>
            <input matInput formControlName="email" autocomplete="email" />
            <mat-hint>
              <span [class.text-danger]="emailMsg().type === 'bad'" [class.text-success]="emailMsg().type === 'ok'">
                {{ emailMsg().text }}
              </span>
            </mat-hint>
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Contrasena</mat-label>
            <input
              matInput
              [type]="showPassword() ? 'text' : 'password'"
              formControlName="password"
              autocomplete="new-password"
            />
            <button
              mat-icon-button
              matSuffix
              type="button"
              (click)="togglePasswordVisibility()"
              [attr.aria-label]="showPassword() ? 'Ocultar contrasena' : 'Mostrar contrasena'"
            >
              <mat-icon>{{ showPassword() ? 'visibility_off' : 'visibility' }}</mat-icon>
            </button>
            <mat-hint>
              <span [class.text-danger]="passMsg().type === 'bad'" [class.text-success]="passMsg().type === 'ok'">
                {{ passMsg().text }}
              </span>
            </mat-hint>
          </mat-form-field>

          <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid || loading()">
            {{ loading() ? 'Creando...' : 'Crear cuenta' }}
          </button>
        </form>

        <div class="register-card__switch mt-3">
          Ya tienes cuenta?
          <a routerLink="/login">Iniciar sesion</a>
        </div>

        @if (error()) {
          <div class="alert alert-danger mt-3 py-2 mb-0">{{ error() }}</div>
        }
      </mat-card-content>
    </mat-card>
  </div>
</div>
